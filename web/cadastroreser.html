<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Reserva</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
<div class="container">
<aside class="sidebar">
    <div class="logo">
      <i class="fa-solid fa-hotel"></i>
      <div>
        <h3>Hotel</h3>
        <span>Reservas</span>
      </div>
    </div>
    <nav>
      <a href="./index.html">
        <i class="fa-solid fa-bed"></i>
        Quartos
      </a>
      <a class="active">
        <i class="fa-solid fa-calendar-days"></i>Reservas
      </a>
      <a href="#">
        <i class="fa-solid fa-circle-info"></i>
        Sobre
      </a>
    </nav>
  </aside>
  <main>
    <div class="header-page">
      <div>
        <h2>Cadastro de Reserva</h2>
        <p>Adicione uma nova reserva para o quarto selecionado</p>
      </div>
    </div>
    <div class="form-card">
      <form id="formReserva">
        <div class="form-group">
          <label>Nome do Hóspede</label>
          <input type="text" id="hospede" placeholder="Digite o nome do hóspede" required>
        </div>
        <div class="form-group">
          <label>Data de Entrada</label>
          <input type="date" id="dataEntrada" required>
        </div>
        <div class="form-group">
          <label>Data de Saída</label>
          <input type="date" id="dataSaida" require>
        </div>
        <div class="form-buttons">
          <button type="submit" class="btn-primary">
            <i class="fa-solid fa-floppy-disk"></i>Cadastrar Reserva
          </button>
          <a href="./reservas.html" class="btn-secondary">
            <i class="fa-solid fa-arrow-left"></i>Voltar
          </a>
        </div>
      </form>
    </div>
    <footer>© 2024 Hotel Reservas - Projeto Full Stack </footer>
  </main>
</div>
<script src="./script.js"></script>
</body>
</html>
